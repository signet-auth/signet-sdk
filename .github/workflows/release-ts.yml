name: Release TypeScript

on:
  push:
    tags:
      - 'ts-v*'

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: |
          npm cache clean --force
          rm -rf node_modules
          npm install --prefer-online --no-audit --no-fund 2>&1 || true
          if [ ! -f node_modules/@types/node/index.d.ts ]; then
            rm -rf node_modules package-lock.json
            npm install --prefer-online --no-audit --no-fund 2>&1 || true
          fi
          if [ ! -f node_modules/@types/node/index.d.ts ]; then
            npm install @types/node typescript vitest --no-audit --no-fund 2>&1 || true
          fi
          test -f node_modules/@types/node/index.d.ts || { echo "@types/node not installed"; exit 1; }
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
