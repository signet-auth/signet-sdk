name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          npm cache clean --force
          rm -rf node_modules
          npm install --prefer-online --no-audit --no-fund 2>&1 || true
          # Verify critical packages are installed correctly
          if [ ! -f node_modules/@types/node/index.d.ts ]; then
            echo "First install incomplete, retrying with clean state..."
            rm -rf node_modules package-lock.json
            npm install --prefer-online --no-audit --no-fund 2>&1 || true
          fi
          if [ ! -f node_modules/@types/node/index.d.ts ]; then
            echo "Second install failed, trying individual install..."
            npm install @types/node typescript vitest --no-audit --no-fund 2>&1 || true
          fi
          node -e "require('typescript/lib/typescript')" || { echo "TypeScript not installed"; exit 1; }
          test -f node_modules/@types/node/index.d.ts || { echo "@types/node not installed correctly"; exit 1; }
      - run: npm run build
      - run: npm test

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: mypy src/
