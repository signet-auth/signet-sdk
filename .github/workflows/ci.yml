name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm install && test -d node_modules/@types/node && break
            echo "Attempt $i failed, cleaning and retrying..."
            rm -rf node_modules
            sleep 5
          done
          test -d node_modules/@types/node || { echo "Failed to install dependencies after 3 attempts"; exit 1; }
      - run: npm run build
      - run: npm test

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: mypy src/
